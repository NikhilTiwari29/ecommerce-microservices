# Application name
spring.application.name=order-service

# Server
server.port=8081

# ===============================
# = MySQL Database Configuration
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3307/order_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
