services:
  product:
    base-url: http://localhost:8080
  order:
    base-url: http://localhost:8081
  inventory:
    base-url: http://localhost:8082

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: product_service
              uri: ${services.product.base-url}
              predicates:
                - Path=/api/product/**

            - id: order_service
              uri: ${services.order.base-url}
              predicates:
                - Path=/api/order/**

            - id: inventory_service
              uri: ${services.inventory.base-url}
              predicates:
                - Path=/api/inventory/**
