############################################################
# =============== BASIC APPLICATION SETTINGS ===============
############################################################

spring.application.name=api-gateway
server.port=9000



############################################################
# ================= SECURITY (KEYCLOAK / JWT) ==============
############################################################

# Keycloak issuer URI used by Spring Security to validate JWT tokens
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/spring-microservices-security-realm



############################################################
# ===================== SWAGGER CONFIG =====================
############################################################

# Exposes Swagger UI at: http://<host>:<port>/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Exposes OpenAPI JSON at: http://<host>:<port>/api-docs
springdoc.api-docs.path=/api-docs



############################################################
# ================= SWAGGER AGGREGATION ====================
############################################################

# Swagger dropdown entry for Product Service
# Gateway route: /aggregate/product-service/v3/api-docs ? http://localhost:8080/api-docs
springdoc.swagger-ui.urls[0].name=Product Service
springdoc.swagger-ui.urls[0].url=/aggregate/product-service/v3/api-docs

# Swagger dropdown entry for Order Service
# Gateway route: /aggregate/order-service/v3/api-docs ? http://localhost:8081/api-docs
springdoc.swagger-ui.urls[1].name=Order Service
springdoc.swagger-ui.urls[1].url=/aggregate/order-service/v3/api-docs

# Swagger dropdown entry for Inventory Service
# Gateway route: /aggregate/inventory-service/v3/api-docs ? http://localhost:8082/api-docs
springdoc.swagger-ui.urls[2].name=Inventory Service
springdoc.swagger-ui.urls[2].url=/aggregate/inventory-service/v3/api-docs



############################################################
# ================== RESILIENCE4J SETTINGS =================
############################################################

# Enables Spring Boot Actuator health indicator for circuit breakers.
# This allows /actuator/health to include the state of each circuit breaker (UP, DOWN, OPEN, etc.)
management.health.circuitbreakers.enabled=true

# Exposes all actuator endpoints over HTTP.
# Useful in development for debugging and monitoring.
# In production this should be restricted (for security reasons).
management.endpoints.web.exposure.include=*

# Always show detailed health information (component status, circuit breaker states, etc.)
# Without this, health details are hidden unless you are authenticated.
management.endpoint.health.show-details=always


############################################################
# --------------- RESILIENCE FLOW OVERVIEW ----------------
############################################################
#
# When someone hits a downstream service through the Gateway and it returns HTTP 500,
# Retry will attempt the call up to three times, and if all attempts fail the request is
# forwarded to fallback and the Circuit Breaker records one failure; once failures reach
# 50% (failure-rate-threshold) of the last 10 calls (sliding-window-size) and the minimum
# number of calls is reached (minimum-number-of-calls = 5), the circuit opens and all new
# requests go directly to fallback; after five seconds (wait-duration-in-open-state) the
# circuit moves to HALF_OPEN and allows three (permitted-number-of-calls-in-half-open-state)
# test calls, moving back to OPEN immediately if any one request fails or closing if all
# succeed, and this entire circuit breaker configuration in the API Gateway applies only to
# gateway-to-service routing to prevent routing-level failures, thread exhaustion, and
# cascading outages, meaning it does not protect internal service-to-service calls and each
# microservice must implement its own circuit breaker and retry logic for any downstream
# dependencies it calls internally so that resilience is enforced at every network boundary
# rather than relying solely on the gateway.
#
############################################################



############################################################
# ---------------- CIRCUIT BREAKER CONFIG ------------------
############################################################

# Default circuit breaker configuration
resilience4j.circuitbreaker.configs.default.register-health-indicator=true

# Use count-based sliding window approach to calculate failure or success in the below property (not time-based)
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED

# Number of calls to consider before calculating failure rate
resilience4j.circuitbreaker.configs.default.sliding-window-size=10

# Percentage of failures after which circuit opens (we set 50 percent of above sliding-window-size)
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50

# How long the circuit remains open before trying again
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s

# Number of calls allowed in HALF_OPEN state to test recovery
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

# Automatically move from OPEN ? HALF_OPEN after wait duration
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

# Minimum number of calls that must be recorded before the Circuit Breaker is allowed
# to calculate failure rate and potentially open (prevents opening too early due to noise).
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.productServiceCircuitBreaker.base-config=default
resilience4j.circuitbreaker.instances.orderServiceCircuitBreaker.base-config=default
resilience4j.circuitbreaker.instances.inventoryServiceCircuitBreaker.base-config=default



############################################################
# ---------------- RESILIENCE4J Timeout CONFIG ---------------
############################################################

# Maximum amount of time a call is allowed to run before it is forcefully timed out.
# If the downstream service does not respond within this duration, a TimeoutException is thrown.
# This prevents threads from being blocked indefinitely due to slow or unresponsive services.
# if this timeout occurs the failure-rate-threshold times then the circuit will open
resilience4j.timelimiter.configs.default.timeout-duration=3s


############################################################
# ---------------- RESILIENCE4J RETRY CONFIG ---------------
############################################################

# Maximum number of attempts for a failed call.
# This includes the initial call, so max-attempts=3 means:
#   1 initial call + up to 2 retries if failures occur.
resilience4j.retry.configs.default.max-attempts=3

# Time to wait between retry attempts.
# This is a fixed backoff; after each failure, the gateway waits 2s before retrying.
resilience4j.retry.configs.default.wait-duration=2s

